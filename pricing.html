<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI抠图 -产品价格</title>
  <script src="https://www.paypal.com/sdk/js?client-id=AWCce2tz9WTayLHGbHilQK-8jCPNQb9wuF9F5eG5-l7fcwSZGAHxPj566-ApbRslGbPQTovZLJIVLFxL&currency=CNY"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container { max-width: 1100px; margin: 0 auto; }
    
    .header { 
      background: white; 
      border-radius: 16px; 
      padding: 20px 40px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .logo { font-size: 24px; font-weight: bold; color: #667eea; }
    .logo span { color: #764ba2; }
    .back-btn { 
      color: #667eea; 
      text-decoration: none; 
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .back-btn:hover { text-decoration: underline; }
    
    .breadcrumb { color: #666; font-size: 14px; margin-bottom: 20px; }
    .breadcrumb a { color: #667eea; text-decoration: none; }
    .breadcrumb span { margin: 0 8px; }
    
    .product-container { 
      display: flex; 
      gap: 40px; 
      background: white; 
      border-radius: 20px; 
      padding: 40px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
    }
    .product-image { flex: 1; }
    .product-img { 
      width: 100%; 
      border-radius: 16px; 
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); 
      aspect-ratio: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 100px; 
    }
    
    .product-info { flex: 1; padding-left: 20px; }
    .product-title { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 15px; }
    .product-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .stars { color: #ffc107; }
    .rating-text { color: #666; font-size: 14px; }
    .product-price { font-size: 36px; font-weight: bold; color: #667eea; margin-bottom: 25px; }
    .product-price span { font-size: 16px; color: #999; font-weight: normal; }
    .product-price .original { font-size: 18px; color: #999; text-decoration: line-through; margin-left: 10px; }
    
    .subscribe-btn { 
      background: linear-gradient(135deg, #667eea, #764ba2); 
      color: white; 
      border: none; 
      padding: 18px 50px; 
      border-radius: 30px; 
      font-size: 18px; 
      cursor: pointer; 
      width: 100%; 
      margin-bottom: 25px; 
      transition: transform 0.2s; 
    }
    .subscribe-btn:hover { transform: translateY(-2px); }
    
    .price-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
    .price-box-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
    .price-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .price-item:last-child { border-bottom: none; }
    .price-item-label { color: #666; }
    .price-item-value { color: #333; font-weight: 500; }
    
    .features-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
    .features-list { list-style: none; }
    .features-list li { color: #666; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .features-list li::before { content: '✓'; color: #28a745; font-weight: bold; }
    
    .trust-badges { display: flex; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
    .trust-item { display: flex; align-items: center; gap: 8px; color: #666; font-size: 13px; }
    .trust-icon { font-size: 18px; }
    
    .plan-switch { display: flex; gap: 10px; margin-bottom: 20px; }
    .plan-btn { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; text-align: center; transition: all 0.3s; }
    .plan-btn:hover { border-color: #667eea; }
    .plan-btn.active { border-color: #667eea; background: #f8f9ff; }
    .plan-btn-title { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 5px; }
    .plan-btn-price { font-size: 20px; font-weight: bold; color: #667eea; }
    .plan-btn.recommended .plan-btn-price { color: #f5576c; }
    
    .footer { text-align: center; padding: 30px; color: rgba(255,255,255,0.6); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">AI<span>抠图</span></div>
      <a href="https://image-background-remover.world" class="back-btn">← 返回首页</a>
    </div>
    
    <div class="breadcrumb"><a href="https://image-background-remover.world">Home</a><span>›</span>AI产品<span>›</span>抠图</div>
    
    <div class="product-container">
      <div class="product-image">
        <div class="product-img">🖼️</div>
      </div>
      
      <div class="product-info">
        <h1 class="product-title">AI自动抠图</h1>
        <div class="product-rating">
          <span class="stars">★★★★★</span>
          <span class="rating-text">5.0 (128 条评价)</span>
        </div>
        
        <div class="plan-switch">
          <div class="plan-btn" data-plan="monthly" onclick="selectPlan('monthly')">
            <div class="plan-btn-title">月度会员</div>
            <div class="plan-btn-price">¥9<span>/月</span></div>
          </div>
          <div class="plan-btn recommended" data-plan="yearly" onclick="selectPlan('yearly')">
            <div class="plan-btn-title">年度会员</div>
            <div class="plan-btn-price">¥59<span>/年</span></div>
          </div>
        </div>
        
        <div class="product-price" id="displayPrice">¥9<span>/月</span><span class="original">¥108</span></div>
        
        <button class="subscribe-btn" onclick="startPay()">立即订阅</button>
        <div id="paypal-buttons" style="display: none; margin-top: 20px;"></div>
        
        <div class="price-box">
          <div class="price-box-title">📌 订阅价格</div>
          <div class="price-item">
            <span class="price-item-label">月度价格</span>
            <span class="price-item-value" id="monthlyPrice">¥9/月</span>
          </div>
          <div class="price-item">
            <span class="price-item-label">年度价格</span>
            <span class="price-item-value" id="yearlyPrice">¥59/年 (省60%)</span>
          </div>
          <div class="price-item">
            <span class="price-item-label">积分额度</span>
            <span class="price-item-value" id="quotaDisplay">30次/月</span>
          </div>
          <div class="price-item">
            <span class="price-item-label">首月优惠</span>
            <span class="price-item-value">赠送3积分</span>
          </div>
        </div>
        
        <div class="features-title">包含内容</div>
        <ul class="features-list">
          <li>✅ 自动背景移除</li>
          <li>✅ 高清图片下载</li>
          <li>✅ 批量处理（年度专享）</li>
          <li>✅ 随时取消订阅</li>
          <li>✅ 7×24小时客服支持</li>
        </ul>
        
        <div class="trust-badges">
          <div class="trust-item"><span class="trust-icon">🔒</span> 安全支付</div>
          <div class="trust-item"><span class="trust-icon">↩️</span> 随时取消</div>
          <div class="trust-item"><span class="trust-icon">⚡</span> 立即生效</div>
        </div>
      </div>
    </div>
    
    <div class="footer">Copyright © 2025 AI抠图 All Rights Reserved.</div>
  </div>

  <script>
    let selectedPlan = 'monthly';
    
    function selectPlan(plan) {
      selectedPlan = plan;
      document.querySelectorAll('.plan-btn').forEach(btn => { btn.classList.toggle('active', btn.dataset.plan === plan); });
      
      const priceEl = document.getElementById('displayPrice');
      const quotaEl = document.getElementById('quotaDisplay');
      
      if (plan === 'monthly') {
        priceEl.innerHTML = '¥9<span>/月</span><span class="original">¥108</span>';
        quotaEl.textContent = '30次/月';
      } else {
        priceEl.innerHTML = '¥59<span>/年</span><span class="original">¥108</span>';
        quotaEl.textContent = '无限次';
      }
    }
    
    function startPay() {
      console.log('PayPal object:', paypal);
      console.log('Selected plan:', selectedPlan);
      
      const container = document.getElementById('paypal-buttons');
      container.style.display = 'block';
      container.innerHTML = '<p style="text-align:center;color:#666;margin:20px;">加载PayPal中...</p>';
      
      // 等待PayPal SDK加载
      setTimeout(() => {
        if (!window.paypal || !window.paypal.Buttons) {
          container.innerHTML = '<p style="text-align:center;color:#dc3545;margin:20px;">❌ PayPal加载失败<br>请检查网络后重试</p>';
          return;
        }
        
        container.innerHTML = '';
        
        const amount = selectedPlan === 'monthly' ? '9' : '59';
        const description = selectedPlan === 'monthly' ? '月度会员 ¥9/月' : '年度会员 ¥59/年';
        
        window.paypal.Buttons({
          style: { layout: 'vertical', color: 'blue', shape: 'rect', label: 'paypal' },
          createOrder: (data, actions) => {
            return actions.order.create({
              purchase_units: [{
                description: description,
                amount: { currency_code: 'CNY', value: amount }
              }]
            });
          },
          onApprove: (data, actions) => {
            return actions.order.capture().then(details => {
              alert('✅ 支付成功！感谢您的购买');
              console.log('Payment details:', details);
            });
          },
          onError: (err) => {
            console.error('PayPal error:', err);
            container.innerHTML = '<p style="text-align:center;color:#dc3545;margin:20px;">❌ 支付失败<br>错误: ' + err.message + '</p>';
          }
        }).render(container);
        
        container.scrollIntoView({ behavior: 'smooth' });
      }, 1000);
    }
    
    // 默认选中年度
    selectPlan('yearly');
  </script>
</body>
</html>
