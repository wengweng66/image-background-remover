<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI抠图 - 一键移除图片背景</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #333; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
    .upload-area.dragover { border-color: #667eea; background: #f0f3ff; }
    .upload-icon { font-size: 48px; margin-bottom: 10px; }
    .upload-text { color: #666; font-size: 16px; }
    .upload-hint { color: #999; font-size: 14px; margin-top: 8px; }
    input[type="file"] { display: none; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s;
      margin-bottom: 10px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: #666;
      border: 2px solid #ddd;
    }
    .btn-secondary:hover { border-color: #667eea; }
    .btn-outline {
      background: transparent;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-outline:hover { background: #667eea; color: white; }
    .result { margin-top: 30px; text-align: center; }
    .result img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .download-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .loading { display: none; margin-top: 20px; text-align: center; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error {
      color: #dc3545;
      margin-top: 15px;
      padding: 10px;
      background: #ffeef0;
      border-radius: 8px;
      display: none;
    }
    .tips { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 14px; color: #666; }
    
    /* 用户区域样式 */
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9ff;
      border-radius: 12px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .user-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .user-info .name {
      color: #333;
      font-weight: 500;
    }
    .user-info .email {
      font-size: 12px;
      color: #666;
    }
    .user-actions {
      display: flex;
      gap: 10px;
    }
    .user-actions button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-profile {
      background: #667eea;
      color: white;
    }
    .btn-logout {
      background: #fff;
      color: #666;
      border: 1px solid #ddd;
    }
    
    /* 个人中心弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .profile-header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }
    .profile-header img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
    }
    .profile-header h2 {
      color: #333;
      margin-bottom: 5px;
    }
    .profile-header p {
      color: #666;
      font-size: 14px;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-item .value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
    .stat-item .label {
      font-size: 12px;
      color: #666;
    }
    .profile-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .profile-actions button {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ AI 抠图</h1>
    <p class="subtitle">一键移除图片背景 | 支持 JPG/PNG</p>
    
    <!-- 用户栏（登录后显示） -->
    <div id="userBar" class="user-bar" style="display: none;">
      <div class="user-info" onclick="showProfile()">
        <img id="userAvatar" src="" alt="avatar">
        <div>
          <div class="name" id="userName"></div>
          <div class="email" id="userEmail"></div>
        </div>
      </div>
      <div class="user-actions">
        <button class="btn-profile" onclick="showProfile()">👤 个人中心</button>
        <button class="btn-logout" onclick="logout()">🚪 退出</button>
      </div>
    </div>
    
    <!-- 登录按钮区域（未登录显示） -->
    <div id="loginArea">
      <button class="btn btn-secondary" id="loginBtn">🔐 Google 账号登录</button>
    </div>
    
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📤</div>
      <div class="upload-text">点击或拖拽图片到这里</div>
      <div class="upload-hint">支持 JPG、PNG，最大 10MB</div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png">
    </div>
    
    <button class="btn" id="processBtn" disabled>开始处理</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 10px; color: #666;">正在处理中...</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result" style="display: none;">
      <h3>处理完成！</h3>
      <img id="resultImage" alt="处理后的图片">
      <br>
      <a class="download-btn" id="downloadBtn" download="removed-bg.png">下载图片</a>
    </div>
    
    <div class="tips">💡 提示：处理需要几秒钟，请耐心等待</div>
  </div>

  <!-- 个人中心弹窗 -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeProfile()">×</span>
      <div class="profile-header">
        <img id="profileAvatar" src="" alt="avatar">
        <h2 id="profileName"></h2>
        <p id="profileEmail"></p>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="value" id="usageCount">0</div>
          <div class="label">累计抠图</div>
        </div>
        <div class="stat-item">
          <div class="value" id="memberDays">0</div>
          <div class="label">注册天数</div>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-outline" onclick="alert('功能开发中...')">⚙️ 账户设置</button>
        <button class="btn btn-outline" onclick="alert('功能开发中...')">💳 会员升级</button>
        <button class="btn btn-outline" style="border-color: #dc3545; color: #dc3545;" onclick="logout()">🚪 退出登录</button>
      </div>
    </div>
  </div>

  <script>
    // Google OAuth 配置
    const GOOGLE_CLIENT_ID = '889503424638-11h4hb7kbkk872kq8ni6m50d1dncmh7j.apps.googleusercontent.com';
    
    const API_KEY = 'XJsn7GKbB1EGDEbf5T2izFW1';
    
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let selectedFile = null;
    
    // 获取用户数据
    function getUserData() {
      const data = localStorage.getItem('userData');
      return data ? JSON.parse(data) : null;
    }
    
    // 保存用户数据
    function saveUserData(user) {
      const existing = getUserData() || { usageCount: 0, registerTime: Date.now() };
      const userData = {
        ...user,
        usageCount: existing.usageCount,
        registerTime: existing.registerTime
      };
      localStorage.setItem('userData', JSON.stringify(userData));
    }
    
    // 增加使用次数
    function incrementUsage() {
      const data = getUserData();
      if (data) {
        data.usageCount = (data.usageCount || 0) + 1;
        localStorage.setItem('userData', JSON.stringify(data));
      }
    }
    
    // 检查登录状态
    function checkLogin() {
      const user = getUserData();
      if (user && user.email) {
        document.getElementById('userBar').style.display = 'flex';
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('userAvatar').src = user.picture || 'https://via.placeholder.com/40';
        document.getElementById('userName').textContent = user.name || '用户';
        document.getElementById('userEmail').textContent = user.email;
      } else {
        document.getElementById('userBar').style.display = 'none';
        document.getElementById('loginArea').style.display = 'block';
      }
    }
    
    // 显示个人中心
    function showProfile() {
      const user = getUserData();
      if (!user) return;
      
      document.getElementById('profileAvatar').src = user.picture || 'https://via.placeholder.com/80';
      document.getElementById('profileName').textContent = user.name || '用户';
      document.getElementById('profileEmail').textContent = user.email || '';
      document.getElementById('usageCount').textContent = user.usageCount || 0;
      
      // 计算注册天数
      const days = Math.floor((Date.now() - (user.registerTime || Date.now())) / (1000 * 60 * 60 * 24)) + 1;
      document.getElementById('memberDays').textContent = days;
      
      document.getElementById('profileModal').classList.add('active');
    }
    
    // 关闭个人中心
    function closeProfile() {
      document.getElementById('profileModal').classList.remove('active');
    }
    
    // 初始化 Google Identity Services
    function initGIS() {
      document.getElementById('loginBtn').addEventListener('click', () => {
        google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'email profile',
          callback: (response) => {
            if (response.access_token) {
              fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                headers: { Authorization: 'Bearer ' + response.access_token }
              })
              .then(res => res.json())
              .then(user => {
                saveUserData(user);
                checkLogin();
              })
              .catch(err => {
                showError('获取用户信息失败: ' + err.message);
              });
            }
          },
        }).requestAccessToken({ prompt: 'consent' });
      });
    }
    
    // 页面加载时检查
    window.addEventListener('load', () => {
      checkLogin();
      if (window.google) {
        initGIS();
      } else {
        setTimeout(initGIS, 1000);
      }
    });
    
    // 点击弹窗外部关闭
    document.getElementById('profileModal').addEventListener('click', (e) => {
      if (e.target.id === 'profileModal') {
        closeProfile();
      }
    });
    
    // 退出登录
    function logout() {
      localStorage.removeItem('userData');
      closeProfile();
      checkLogin();
    }
    
    // 点击上传
    uploadArea.addEventListener('click', () => fileInput.click());
    
    // 文件选择
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });
    
    // 拖拽
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    
    function handleFile(file) {
      if (!['image/jpeg', 'image/png'].includes(file.type)) {
        showError('仅支持 JPG 和 PNG 格式');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showError('文件过大，请上传小于 10MB 的图片');
        return;
      }
      selectedFile = file;
      processBtn.disabled = false;
      hideError();
      result.style.display = 'none';
    }
    
    // 处理图片
    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      
      processBtn.disabled = true;
      loading.style.display = 'block';
      hideError();
      result.style.display = 'none';
      
      try {
        const formData = new FormData();
        formData.append('image_file', selectedFile);
        formData.append('size', 'auto');
        
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': API_KEY },
          body: formData,
        });
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.errors?.[0]?.detail || '处理失败');
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        
        resultImage.src = url;
        downloadBtn.href = url;
        result.style.display = 'block';
        
        // 增加使用次数
        incrementUsage();
        
      } catch (err) {
        showError(err.message);
      } finally {
        loading.style.display = 'none';
        processBtn.disabled = false;
      }
    });
    
    function showError(msg) {
      error.textContent = msg;
      error.style.display = 'block';
    }
    function hideError() { error.style.display = 'none'; }
  </script>
</body>
</html>
